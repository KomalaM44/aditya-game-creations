<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geometry Run</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label="Geometry Run 2D jumping game"></canvas>
      <a class="home-link" href="../../index.html">Home</a>
      <section class="top-hud">
        <div>
          <strong>Geometry Run</strong>
          <span id="stats">Attempt 1 · Easy</span>
        </div>
        <div class="meter" aria-hidden="true"><span id="progress"></span></div>
      </section>
      <section class="panel level-panel" aria-label="Levels">
        <button class="level active" data-level="easy" type="button">Easy</button>
        <button class="level" data-level="medium" type="button">Medium</button>
        <button class="level" data-level="hard" type="button">Hard</button>
        <button class="level" data-level="expert" type="button">Expert</button>
        <button class="level" data-level="legend" type="button">Legend</button>
        <button class="level" data-level="mythic" type="button">Mythic</button>
        <button class="level" data-level="demon" type="button">Demon</button>
        <button class="level" data-level="ultraDemon" type="button">Ultra Demon</button>
      </section>
      <section class="panel skin-panel" aria-label="Skins">
        <button class="skin active" data-skin="classic" type="button" title="Classic skin"></button>
        <button class="skin" data-skin="neon" type="button" title="Neon skin"></button>
        <button class="skin" data-skin="fire" type="button" title="Fire skin"></button>
        <button class="skin" data-skin="mint" type="button" title="Mint skin"></button>
        <button class="skin" data-skin="shadow" type="button" title="Shadow skin"></button>
      </section>
      <section id="start-screen" class="overlay">
        <div class="title-stack">
          <p class="kicker">2D portal runner</p>
          <h1>Geometry Run</h1>
          <p>Press Space or tap to jump. Dodge spikes and blocks, hit portals, flip upside down, and fly through jet sections.</p>
          <button id="start-button" type="button">Play</button>
        </div>
      </section>
      <section id="end-screen" class="overlay hidden">
        <div class="title-stack">
          <p class="kicker">Level clear</p>
          <h2>Geometry Master</h2>
          <p id="end-copy">You made it through the course.</p>
          <button id="again-button" type="button">Play Again</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
